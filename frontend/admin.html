<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>⚙️ LatAm Arena — Admin</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0d1117;color:#e6edf3;min-height:100vh;display:flex;flex-direction:column}

/* ── header ── */
#header{display:flex;align-items:center;justify-content:space-between;padding:10px 24px;background:#161b22;border-bottom:1px solid #30363d;flex-shrink:0}
#logo{font-size:16px;font-weight:800;letter-spacing:3px;color:#f85149}
#hstatus{display:flex;align-items:center;gap:12px;font-size:13px}
#health-dot{font-size:18px;color:#484f58;cursor:pointer;title:"Click to ping"}
#health-dot.ok{color:#3fb950}
#health-dot.error{color:#f85149}
#phase-tag{background:#21262d;border:1px solid #30363d;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700;letter-spacing:2px}
#phase-tag.lobby  {border-color:#58a6ff;color:#58a6ff}
#phase-tag.roaming{border-color:#3fb950;color:#3fb950}
#phase-tag.finals {border-color:#f78166;color:#f78166}
#phase-tag.ended  {border-color:#d2a8ff;color:#d2a8ff}

/* ── conn bar ── */
#conn-bar{display:flex;align-items:center;gap:8px;padding:8px 24px;background:#0d1117;border-bottom:1px solid #21262d;font-size:12px;color:#8b949e}
input.inp{background:#161b22;border:1px solid #30363d;color:#e6edf3;padding:4px 10px;border-radius:4px;font-size:12px;outline:none}
input.inp:focus{border-color:#58a6ff}
.btn{border:none;padding:5px 14px;border-radius:4px;cursor:pointer;font-size:12px;font-weight:600;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn-blue{background:#1f6feb;color:#fff}
.btn-green{background:#238636;color:#fff}
.btn-red  {background:#b91c1c;color:#fff}
.btn-orange{background:#d97706;color:#fff}
.btn-gray {background:#30363d;color:#e6edf3}
.btn-sm{padding:3px 10px;font-size:11px}

/* ── layout ── */
#content{display:grid;grid-template-columns:1fr 1fr;gap:0;flex:1;overflow:hidden}
.panel{padding:16px 20px;overflow-y:auto;border-right:1px solid #21262d}
.panel:last-child{border-right:none}
.panel-title{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#484f58;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.panel-title .badge{background:#21262d;border-radius:10px;padding:1px 8px;font-size:11px;color:#8b949e}

/* ── agent cards ── */
.agent-card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;transition:border-color .2s}
.agent-card:hover{border-color:#58a6ff}
.agent-card.eliminated{opacity:.4;border-style:dashed}
.agent-avatar{font-size:28px;flex-shrink:0}
.agent-info{flex:1;min-width:0}
.agent-name{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.agent-desc{font-size:11px;color:#8b949e;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.agent-meta{font-size:11px;color:#484f58;margin-top:3px}
.agent-actions{display:flex;gap:6px;flex-shrink:0}
.agent-score{font-size:18px;font-weight:800;color:#3fb950;flex-shrink:0;text-align:right;min-width:40px}

/* ── tournament controls ── */
#ctrl-panel{grid-column:1/-1;background:#161b22;border-top:1px solid #21262d;padding:16px 24px;flex-shrink:0;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
#ctrl-title{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#484f58;margin-right:4px}
.ctrl-separator{width:1px;height:30px;background:#30363d;margin:0 4px}

/* ── status log ── */
#log{height:80px;background:#0d1117;border-top:1px solid #21262d;padding:8px 24px;overflow-y:auto;flex-shrink:0}
.log-entry{font-size:11px;color:#8b949e;margin-bottom:2px;font-family:'SF Mono',Consolas,monospace}
.log-entry.ok{color:#3fb950}
.log-entry.warn{color:#e8a838}
.log-entry.err{color:#f85149}

/* ── empty state ── */
.empty{text-align:center;color:#484f58;padding:30px;font-size:13px}

/* ── scrollbar ── */
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#30363d;border-radius:2px}

/* ── confirm modal ── */
#modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:999;align-items:center;justify-content:center}
#modal.show{display:flex}
#modal-box{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:24px 28px;max-width:360px;width:90%}
#modal-title{font-weight:800;font-size:16px;margin-bottom:8px}
#modal-msg{font-size:13px;color:#8b949e;margin-bottom:20px;line-height:1.6}
#modal-btns{display:flex;gap:8px;justify-content:flex-end}
</style>
</head>
<body>

<div id="header">
  <div id="logo">⚙️ LATAM ARENA — ADMIN</div>
  <div id="hstatus">
    <span id="health-dot" title="Click to ping" onclick="ping()">●</span>
    <span id="health-txt" style="color:#484f58;font-size:12px">Not connected</span>
    <span id="phase-tag" class="lobby">LOBBY</span>
  </div>
</div>

<div id="conn-bar">
  <span>Arena URL:</span>
  <input class="inp" id="arena-url" type="text" placeholder="https://agent-coliseum.onrender.com" style="width:240px">
  <span>Token:</span>
  <input class="inp" id="admin-token" type="password" placeholder="ARENA_ADMIN_TOKEN" style="width:200px">
  <button class="btn btn-blue" onclick="connect()">Connect</button>
  <button class="btn btn-gray" onclick="ping()" style="margin-left:4px">Ping</button>
  <span id="conn-status" style="margin-left:8px"></span>
</div>

<div id="content">
  <!-- Pending agents -->
  <div class="panel" id="pending-panel">
    <div class="panel-title">
      ⏳ PENDING AGENTS
      <span class="badge" id="pending-count">0</span>
    </div>
    <div id="pending-list"><div class="empty">No pending agents</div></div>
  </div>

  <!-- Active / eliminated agents -->
  <div class="panel" id="active-panel">
    <div class="panel-title">
      ⚔️ ACTIVE AGENTS
      <span class="badge" id="active-count">0</span>
    </div>
    <div id="active-list"><div class="empty">No active agents</div></div>
  </div>
</div>

<!-- Tournament controls -->
<div id="ctrl-panel">
  <span id="ctrl-title">TOURNAMENT</span>

  <button class="btn btn-green" onclick="startTournament()">
    🚀 Start Tournament
  </button>

  <div class="ctrl-separator"></div>

  <button class="btn btn-gray" onclick="refreshAgents()">
    🔄 Refresh
  </button>

  <button class="btn btn-orange" onclick="confirmEnd()">
    ⏹ End Tournament
  </button>

  <div class="ctrl-separator"></div>

  <button class="btn btn-red" onclick="confirmShutdown()">
    🔴 Stop VM
  </button>
</div>

<div id="log">
  <div class="log-entry">Admin panel ready. Enter arena URL and token, then click Connect.</div>
</div>

<!-- Confirm modal -->
<div id="modal">
  <div id="modal-box">
    <div id="modal-title"></div>
    <div id="modal-msg"></div>
    <div id="modal-btns">
      <button class="btn btn-gray" onclick="closeModal()">Cancel</button>
      <button class="btn btn-red" id="modal-confirm">Confirm</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════════════
let ARENA_URL   = localStorage.getItem('coliseum_admin_url')   || '';
let ADMIN_TOKEN = localStorage.getItem('coliseum_admin_token') || '';
let sseSource   = null;

document.getElementById('arena-url').value   = ARENA_URL;
document.getElementById('admin-token').value = ADMIN_TOKEN;

// ═══════════════════════════════════════════════════════
//  API
// ═══════════════════════════════════════════════════════
async function api(method, path, body) {
  const opts = {
    method,
    headers: {
      'Authorization': `Bearer ${ADMIN_TOKEN}`,
      'Content-Type': 'application/json',
    },
  };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(`${ARENA_URL}${path}`, opts);
  if (!res.ok) {
    const txt = await res.text();
    throw new Error(`${res.status}: ${txt}`);
  }
  return res.json();
}

// ═══════════════════════════════════════════════════════
//  CONNECT + PING
// ═══════════════════════════════════════════════════════
function connect() {
  ARENA_URL   = document.getElementById('arena-url').value.trim().replace(/\/$/, '');
  ADMIN_TOKEN = document.getElementById('admin-token').value.trim();
  localStorage.setItem('coliseum_admin_url',   ARENA_URL);
  localStorage.setItem('coliseum_admin_token', ADMIN_TOKEN);

  if (sseSource) sseSource.close();

  log('Connecting to ' + ARENA_URL + '…');
  sseSource = new EventSource(`${ARENA_URL}/stream`);

  sseSource.onopen = () => {
    document.getElementById('conn-status').textContent = '🟢 SSE connected';
    log('SSE stream connected', 'ok');
    refreshAgents();
    ping();
  };

  sseSource.onmessage = (e) => {
    try {
      const ev = JSON.parse(e.data);
      if (ev.type === 'phase_change')  setPhase(ev.payload.phase);
      if (ev.type === 'agent_pending') refreshAgents();
      if (ev.type === 'agent_accepted') refreshAgents();
      if (ev.type === 'agent_eliminated') refreshAgents();
      if (ev.type === 'leaderboard_update') renderActive(ev.payload.agents);
    } catch {}
  };

  sseSource.onerror = () => {
    document.getElementById('conn-status').textContent = '🔴 SSE error';
  };
}

async function ping() {
  const dot = document.getElementById('health-dot');
  const txt = document.getElementById('health-txt');
  try {
    const data = await fetch(`${ARENA_URL}/health`).then(r => r.json());
    dot.className  = 'ok';
    txt.textContent = `Online · phase: ${data.phase}`;
    setPhase(data.phase);
    log(`Health OK — phase: ${data.phase}`, 'ok');
  } catch (err) {
    dot.className  = 'error';
    txt.textContent = 'Unreachable';
    log(`Health check failed: ${err.message}`, 'err');
  }
}

// ═══════════════════════════════════════════════════════
//  AGENTS
// ═══════════════════════════════════════════════════════
async function refreshAgents() {
  try {
    const data = await api('GET', '/admin/agents');
    setPhase(data.phase);
    const pending   = data.agents.filter(a => a.status === 'pending');
    const active    = data.agents.filter(a => a.status === 'active');
    const elim      = data.agents.filter(a => a.status === 'eliminated');

    document.getElementById('pending-count').textContent = pending.length;
    document.getElementById('active-count').textContent  = active.length;

    renderPending(pending);
    renderActive([...active, ...elim]);
  } catch (err) {
    log('Failed to fetch agents: ' + err.message, 'err');
  }
}

function renderPending(agents) {
  const el = document.getElementById('pending-list');
  if (!agents.length) { el.innerHTML = '<div class="empty">No pending agents</div>'; return; }
  el.innerHTML = agents.map(a => `
    <div class="agent-card">
      <div class="agent-avatar">${esc(a.avatar)}</div>
      <div class="agent-info">
        <div class="agent-name">${esc(a.name)}</div>
        <div class="agent-desc">${esc(a.description || 'No description')}</div>
        <div class="agent-meta">ID: ${a.agent_id} · <a href="${esc(a.endpoint)}/health" target="_blank" style="color:#58a6ff">${esc(a.endpoint)}</a></div>
      </div>
      <div class="agent-actions">
        <button class="btn btn-green btn-sm" onclick="acceptAgent('${a.agent_id}')">✅ Accept</button>
        <button class="btn btn-red btn-sm"   onclick="rejectAgent('${a.agent_id}')">❌ Reject</button>
      </div>
    </div>`).join('');
}

function renderActive(agents) {
  const el = document.getElementById('active-list');
  if (!agents.length) { el.innerHTML = '<div class="empty">No agents yet</div>'; return; }
  el.innerHTML = agents.map(a => {
    const elim = a.status === 'eliminated';
    return `
    <div class="agent-card${elim ? ' eliminated' : ''}">
      <div class="agent-avatar">${esc(a.avatar)}</div>
      <div class="agent-info">
        <div class="agent-name">${elim ? '💀 ' : ''}${esc(a.name)}</div>
        <div class="agent-meta">${a.wins}W / ${a.losses}L · ID: ${a.agent_id}</div>
      </div>
      ${!elim ? `<button class="btn btn-red btn-sm" onclick="eliminateAgent('${a.agent_id}','${esc(a.name)}')">💀 Eliminate</button>` : ''}
      <div class="agent-score">${a.score}</div>
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════════════════════
//  ACTIONS
// ═══════════════════════════════════════════════════════
async function acceptAgent(id) {
  try {
    await api('POST', `/admin/accept/${id}`);
    log(`Accepted agent ${id}`, 'ok');
    refreshAgents();
  } catch (err) { log('Accept failed: ' + err.message, 'err'); }
}

async function rejectAgent(id) {
  try {
    await api('POST', `/admin/reject/${id}`);
    log(`Rejected agent ${id}`, 'warn');
    refreshAgents();
  } catch (err) { log('Reject failed: ' + err.message, 'err'); }
}

async function eliminateAgent(id, name) {
  if (!confirm(`Eliminate ${name}?`)) return;
  try {
    await api('POST', `/admin/eliminate/${id}`);
    log(`Manually eliminated ${name}`, 'warn');
    refreshAgents();
  } catch (err) { log('Eliminate failed: ' + err.message, 'err'); }
}

async function startTournament() {
  if (!confirm('Start the tournament? This will transition LOBBY → ROAMING and begin the roaming loop.')) return;
  try {
    await api('POST', '/admin/start');
    log('Tournament STARTED — LOBBY → ROAMING', 'ok');
    setPhase('roaming');
  } catch (err) { log('Start failed: ' + err.message, 'err'); }
}

function confirmEnd() {
  showModal(
    'End Tournament',
    'This will declare the highest-scoring agent the winner and stop the roaming loop. Are you sure?',
    async () => {
      try {
        await api('POST', '/admin/end');
        log('Tournament ended', 'ok');
        setPhase('ended');
      } catch (err) { log('End failed: ' + err.message, 'err'); }
    }
  );
}

function confirmShutdown() {
  showModal(
    '🔴 Stop Azure VM',
    'This will call sudo shutdown now on the arena server. The VM will be deallocated. Only do this AFTER the event.\n\nAre you absolutely sure?',
    async () => {
      try {
        await api('POST', '/admin/shutdown');
        log('VM shutdown command sent', 'warn');
      } catch (err) { log('Shutdown: ' + err.message, 'warn'); }
    },
    'Shutdown VM'
  );
}

// ═══════════════════════════════════════════════════════
//  UI HELPERS
// ═══════════════════════════════════════════════════════
function setPhase(phase) {
  const tag = document.getElementById('phase-tag');
  tag.textContent = phase.toUpperCase();
  tag.className = phase;
}

function log(msg, type = '') {
  const el = document.getElementById('log');
  const ts = new Date().toLocaleTimeString();
  const div = document.createElement('div');
  div.className = 'log-entry' + (type ? ' ' + type : '');
  div.textContent = `[${ts}] ${msg}`;
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;')
                  .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Modal
let _modalCb = null;
function showModal(title, msg, onConfirm, confirmLabel = 'Confirm') {
  document.getElementById('modal-title').textContent   = title;
  document.getElementById('modal-msg').textContent     = msg;
  document.getElementById('modal-confirm').textContent = confirmLabel;
  _modalCb = onConfirm;
  document.getElementById('modal').classList.add('show');
}
function closeModal() {
  document.getElementById('modal').classList.remove('show');
  _modalCb = null;
}
document.getElementById('modal-confirm').addEventListener('click', () => {
  closeModal();
  if (_modalCb) _modalCb();
});

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if (e.key === 'r' && e.ctrlKey) { e.preventDefault(); refreshAgents(); }
});

// Auto-connect
if (ARENA_URL && ADMIN_TOKEN) {
  setTimeout(connect, 300);
}

// Auto-refresh every 15s
setInterval(() => { if (ARENA_URL && ADMIN_TOKEN) refreshAgents(); }, 15000);
</script>
</body>
</html>
