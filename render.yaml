services:
  - type: web
    name: agent-coliseum
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn arena.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ARENA_ADMIN_TOKEN
        sync: false
      - key: AZURE_OPENAI_ENDPOINT
        sync: false
      - key: AZURE_OPENAI_KEY
        sync: false
      - key: AZURE_OPENAI_DEPLOYMENT
        value: gpt-4o
      - key: MAX_AGENTS
        value: 8
      - key: MAX_SIMULTANEOUS_MATCHES
        value: 3
      - key: TURNS_PER_MATCH
        value: 5
      - key: COOLDOWN_SECONDS
        value: 30
      - key: MAP_WIDTH
        value: 20
      - key: MAP_HEIGHT
        value: 15
