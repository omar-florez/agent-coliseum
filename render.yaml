services:
  - type: web
    name: agent-coliseum
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn arena.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ARENA_ADMIN_TOKEN
        sync: false

      # Option A: Azure OpenAI classic (takes priority if both are set)
      - key: AZURE_OPENAI_ENDPOINT
        sync: false
      - key: AZURE_OPENAI_KEY
        sync: false
      - key: AZURE_OPENAI_DEPLOYMENT
        value: gpt-4o

      # Option B: Azure Foundry or standard OpenAI
      # Set OPENAI_BASE_URL to use Azure Foundry endpoint
      # Leave blank to use standard OpenAI
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: OPENAI_BASE_URL
        sync: false

      # Tournament config
      - key: MAX_AGENTS
        value: 8
      - key: MAX_SIMULTANEOUS_MATCHES
        value: 3
      - key: TURNS_PER_MATCH
        value: 3
      - key: COOLDOWN_SECONDS
        value: 30
      - key: MAP_WIDTH
        value: 20
      - key: MAP_HEIGHT
        value: 15